<form (ngSubmit)="onAddTask()" class="mb-4">
  <div class="input-group">
    <input 
      type="text" 
      class="form-control" 
      placeholder="Добавить новую задачу..." 
      [(ngModel)]="newTaskText" 
      name="newTaskText"
      required
    >
    <button 
      class="btn btn-primary" 
      type="submit" 
      [disabled]="!newTaskText.trim()"
    >
      Добавить
    </button>
  </div>
</form>
