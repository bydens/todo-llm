<app-todo-add (addTask)="addTask($event)"></app-todo-add>

<app-todo-filter
  [currentFilter]="(filter$ | async) ?? 'all'"
  (filterChange)="setFilter($event)"
></app-todo-filter>

<div class="list-group mb-3" *ngIf="paginatedTasks$ | async as paginatedTasks">
  <ul class="list-group">
    <li *ngIf="paginatedTasks.length === 0" class="list-group-item text-muted">
      <span *ngIf="(filter$ | async) === 'all'"
        >No tasks yet! Add one above.</span
      >
      <span *ngIf="(filter$ | async) === 'active'">No active tasks.</span>
      <span *ngIf="(filter$ | async) === 'completed'">No completed tasks.</span>
    </li>
    <app-todo-item
      *ngFor="let task of paginatedTasks"
      [task]="task"
      (toggleCompletion)="toggleTaskCompletion($event)"
      (requestDelete)="requestDeleteTask($event)"
    ></app-todo-item>
  </ul>
</div>

<nav
  aria-label="Task pagination"
  *ngIf="(filteredTasks$ | async)?.length ?? 0 > itemsPerPage"
>
  <ul
    class="pagination justify-content-center"
    *ngIf="{
      currentPage: currentPage$ | async,
      totalPages: totalPages$ | async
    } as pagination"
  >
    <li class="page-item" [class.disabled]="pagination.currentPage === 1">
      <button
        class="page-link"
        (click)="previousPage()"
        aria-label="Previous"
        [disabled]="pagination.currentPage === 1"
      >
        <span aria-hidden="true">&laquo;</span>
      </button>
    </li>
    <li class="page-item disabled">
      <span class="page-link"
        >Page {{ pagination.currentPage }} of {{ pagination.totalPages }}</span
      >
    </li>
    <li
      class="page-item"
      [class.disabled]="pagination.currentPage === pagination.totalPages"
    >
      <button
        class="page-link"
        (click)="nextPage()"
        aria-label="Next"
        [disabled]="pagination.currentPage === pagination.totalPages"
      >
        <span aria-hidden="true">&raquo;</span>
      </button>
    </li>
  </ul>
</nav>

<app-confirmation-modal
  [isOpen]="showDeleteConfirmation"
  title="Confirm Deletion"
  message="Are you sure you want to delete this task?"
  confirmButtonText="Delete"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()"
></app-confirmation-modal>
