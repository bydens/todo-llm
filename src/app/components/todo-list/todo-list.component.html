<div class="input-group mb-3">
  <input
    type="text"
    [(ngModel)]="newTaskText"
    class="form-control"
    placeholder="Add a new task..."
    (keyup.enter)="addTask()"
  />
  <button class="btn btn-primary" type="button" (click)="addTask()">Add</button>
</div>
<div class="list-group">
  <h5 class="mb-3">Tasks</h5>
  <ul class="list-group">
    <li *ngIf="tasks.length === 0" class="list-group-item text-muted">
      No tasks yet! Add one above.
    </li>
    <li
      *ngFor="let task of tasks"
      class="list-group-item d-flex justify-content-between align-items-center"
      [class.list-group-item-secondary]="task.completed"
    >
      <div class="form-check">
        <input
          class="form-check-input"
          type="checkbox"
          [checked]="task.completed"
          (change)="toggleTaskCompletion(task.id)"
          [id]="'task-' + task.id"
        />
        <label
          class="form-check-label"
          [for]="'task-' + task.id"
          [class.text-decoration-line-through]="task.completed"
        >
          {{ task.text }}
        </label>
      </div>
      <button
        class="btn btn-danger btn-sm ms-2"
        (click)="requestDeleteTask(task.id)"
      >
        Delete
      </button>
    </li>
  </ul>
</div>

<div
  class="modal"
  tabindex="-1"
  [style.display]="showDeleteConfirmation ? 'block' : 'none'"
  [class.show]="showDeleteConfirmation"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirm Deletion</h5>
        <button
          type="button"
          class="btn-close"
          aria-label="Close"
          (click)="cancelDelete()"
        ></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this task?</p>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary"
          (click)="cancelDelete()"
        >
          Cancel
        </button>
        <button type="button" class="btn btn-danger" (click)="confirmDelete()">
          Delete
        </button>
      </div>
    </div>
  </div>
</div>
<div
  class="modal-backdrop fade"
  [class.show]="showDeleteConfirmation"
  [style.display]="showDeleteConfirmation ? 'block' : 'none'"
></div>
