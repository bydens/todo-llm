<div class="input-group mb-3">
  <input
    type="text"
    [(ngModel)]="newTaskText"
    class="form-control"
    placeholder="Add a new task..."
    (keyup.enter)="addTask()"
  />
  <button class="btn btn-primary" type="button" (click)="addTask()">Add</button>
</div>

<!-- Filter Buttons -->
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0">Tasks</h5>
  <div class="btn-group" role="group" aria-label="Task filters">
    <button
      type="button"
      class="btn btn-outline-secondary"
      [class.active]="(filter$ | async) === 'all'"
      (click)="setFilter('all')"
    >
      All
    </button>
    <button
      type="button"
      class="btn btn-outline-secondary"
      [class.active]="(filter$ | async) === 'active'"
      (click)="setFilter('active')"
    >
      Active
    </button>
    <button
      type="button"
      class="btn btn-outline-secondary"
      [class.active]="(filter$ | async) === 'completed'"
      (click)="setFilter('completed')"
    >
      Completed
    </button>
  </div>
</div>

<!-- Use async pipe for paginatedTasks$ -->
<div class="list-group mb-3" *ngIf="paginatedTasks$ | async as paginatedTasks">
  <ul class="list-group">
    <li *ngIf="paginatedTasks.length === 0" class="list-group-item text-muted">
      <!-- Use async pipe for filter$ -->
      <span *ngIf="(filter$ | async) === 'all'"
        >No tasks yet! Add one above.</span
      >
      <span *ngIf="(filter$ | async) === 'active'">No active tasks.</span>
      <span *ngIf="(filter$ | async) === 'completed'">No completed tasks.</span>
    </li>
    <!-- Replace the <li> content with the app-todo-item component -->
    <app-todo-item
      *ngFor="let task of paginatedTasks"
      [task]="task"
      (toggleCompletion)="toggleTaskCompletion($event)"
      (requestDelete)="requestDeleteTask($event)"
    ></app-todo-item>
  </ul>
</div>

<!-- Pagination Controls - Use async pipe for filteredTasks$ and totalPages$ -->
<nav
  aria-label="Task pagination"
  *ngIf="(filteredTasks$ | async)?.length ?? 0 > itemsPerPage"
>
  <!-- Use async pipe for currentPage$ and totalPages$ -->
  <ul
    class="pagination justify-content-center"
    *ngIf="{
      currentPage: currentPage$ | async,
      totalPages: totalPages$ | async
    } as pagination"
  >
    <li class="page-item" [class.disabled]="pagination.currentPage === 1">
      <button
        class="page-link"
        (click)="previousPage()"
        aria-label="Previous"
        [disabled]="pagination.currentPage === 1"
      >
        <span aria-hidden="true">&laquo;</span>
      </button>
    </li>
    <li class="page-item disabled">
      <span class="page-link"
        >Page {{ pagination.currentPage }} of {{ pagination.totalPages }}</span
      >
    </li>
    <li
      class="page-item"
      [class.disabled]="pagination.currentPage === pagination.totalPages"
    >
      <button
        class="page-link"
        (click)="nextPage()"
        aria-label="Next"
        [disabled]="pagination.currentPage === pagination.totalPages"
      >
        <span aria-hidden="true">&raquo;</span>
      </button>
    </li>
  </ul>
</nav>

<!-- Modal remains the same -->
<div
  class="modal"
  tabindex="-1"
  [style.display]="showDeleteConfirmation ? 'block' : 'none'"
  [class.show]="showDeleteConfirmation"
>
  <!-- ... modal content ... -->
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirm Deletion</h5>
        <button
          type="button"
          class="btn-close"
          aria-label="Close"
          (click)="cancelDelete()"
        ></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this task?</p>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary"
          (click)="cancelDelete()"
        >
          Cancel
        </button>
        <button type="button" class="btn btn-danger" (click)="confirmDelete()">
          Delete
        </button>
      </div>
    </div>
  </div>
</div>
<div
  class="modal-backdrop fade"
  [class.show]="showDeleteConfirmation"
  [style.display]="showDeleteConfirmation ? 'block' : 'none'"
></div>
