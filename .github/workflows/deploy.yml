name: Deploy to GitHub Pages

on:
  push:
    branches: [build]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install -g terser clean-css-cli
          npm install

      - name: Minify JavaScript
        run: |
          echo "Original JS file size:"
          ls -lh script.js
          terser script.js -o script.min.js --compress --mangle
          echo "Minified JS file size:"
          ls -lh script.min.js
          if [ ! -f script.min.js ]; then
            echo "Error: script.min.js was not created"
            exit 1
          fi

      - name: Minify CSS
        run: |
          echo "Original CSS file size:"
          ls -lh styles.css
          cleancss -o styles.min.css styles.css
          echo "Minified CSS file size:"
          ls -lh styles.min.css
          if [ ! -f styles.min.css ]; then
            echo "Error: styles.min.css was not created"
            exit 1
          fi

      - name: Update HTML
        run: |
          echo "Updating HTML file references..."
          awk '{
            gsub(/script\.js/, "script.min.js");
            gsub(/styles\.css/, "styles.min.css");
            print
          }' index.html > index.html.tmp

          mv index.html.tmp index.html

          echo "Updated HTML content:"
          cat index.html

      - name: Verify files
        run: |
          echo "Checking files before deploy:"
          ls -la
          if [ ! -f script.min.js ] || [ ! -f styles.min.css ]; then
            echo "Error: Minified files are missing"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy: Update with minified files"
