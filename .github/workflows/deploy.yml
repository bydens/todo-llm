name: Deploy to GitHub Pages

on:
  push:
    branches: [build]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install -g terser clean-css-cli

      - name: Minify JavaScript
        run: terser script.js -o script.min.js --compress --mangle

      - name: Minify CSS
        run: cleancss -o styles.min.css styles.css

      - name: Update HTML
        run: |
          sed -i 's/script.js/script.min.js/g' index.html
          sed -i 's/styles.css/styles.min.css/g' index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
