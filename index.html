<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="main-bg">
      <div class="todo-container">
        <header class="todo-header">
          <h1>TODO List</h1>
        </header>
        <div class="todo-form-block">
          <form class="todo-form" onsubmit="return false;">
            <input
              type="text"
              id="newTodo"
              placeholder="What would you like to do?"
              aria-label="New task"
              autocomplete="off"
            />
            <button id="addTodo" type="button">Add</button>
          </form>
        </div>
        <div class="todo-list-block">
          <h2>Todo List</h2>
          <div class="todo-list-header">
            <span class="todo-col todo-col-text">List</span>
            <span class="todo-col todo-col-status">Status</span>
            <span class="todo-col todo-col-close">Close</span>
          </div>
          <ul id="todoList" class="todo-list"></ul>
        </div>
        <div class="pagination">
          <button id="prevPage" class="pagination-btn">Previous</button>
          <span id="pageInfo" class="page-info">Page 1</span>
          <button id="nextPage" class="pagination-btn">Next</button>
        </div>
        <div class="todo-stats">
          <span id="itemsLeft">0 items left</span>
        </div>
      </div>
    </div>

    <!-- Delete confirmation modal -->
    <div id="deleteModal" class="modal" aria-hidden="true">
      <div class="modal-content">
        <h2>Confirm Deletion</h2>
        <p>Are you sure you want to delete this task?</p>
        <div class="modal-buttons">
          <button id="confirmDelete" class="delete-btn">Delete</button>
          <button id="cancelDelete" class="cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
